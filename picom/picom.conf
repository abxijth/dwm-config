#################################
#             Shadows           #
#################################

shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 2;

#################################
#   Transparency / Opacity      #
#################################

frame-opacity = 0.8;

#################################
#           Corners             #
#################################

corner-radius = 8;

#################################
#            Blur               #
#################################

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;

#################################
#       General Settings        #
#################################

unredir-if-possible = true;
backend = "glx";
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;

detect-transient = true;

use-damage = true;

#################################
#            Rules              #
#################################

rules: ({
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  match = "window_type = 'dock'    || "
          "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  blur-background = false;
}, {
  match = "window_type != 'dock'";
}, {
  match = "window_type = 'dock' || "
          "window_type = 'desktop'";
  corner-radius = 0;
}, {
  match = "name = 'Notification'   || "
          "class_g = 'Conky'       || "
          "class_g ?= 'Notify-osd' || "
          "class_g = 'Cairo-clock' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
});
